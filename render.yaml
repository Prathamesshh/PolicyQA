services:
  - type: web
    name: policyqa-api
    env: python
    plan: standard
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: HF_HUB_DISABLE_SYMLINKS_WARNING
        value: "1"
